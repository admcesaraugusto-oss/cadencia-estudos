<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#192D4B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cadência">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cadência de Estudos | Cesar Augusto</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#192D4B; --navy-2:#24456B;
  --estudo:#1E5AA0; --familia:#2E8B57; --fisico:#C87828; --sono:#5A468C;
  --bg:#EEF1F5; --card:#FFFFFF; --ink:#1B2430; --muted:#68717E;
  --line:#DCE2EA; --ok:#2E8B57; --warn:#C87828; --bad:#B4433A;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.45}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 60px}

/* ---------- header ---------- */
header{background:var(--navy);color:#fff;padding:22px 14px 18px;margin-bottom:18px}
.hwrap{max-width:760px;margin:0 auto}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.hsub{color:#B9C6DA;font-size:14px;margin-top:4px}
.role{display:flex;gap:8px;margin-top:14px}
.role button{flex:1;padding:9px 10px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.role button.on{background:#fff;color:var(--navy);border-color:#fff}

/* ---------- cadence bars (signature) ---------- */
.cadence{background:var(--card);border-radius:var(--r);padding:16px 18px 12px;border:1px solid var(--line);margin-bottom:14px}
.cad-title{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.cad-title h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)}
.cad-title span{font-size:12px;color:var(--muted)}
.bars{display:flex;gap:8px;align-items:flex-end;height:86px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px;cursor:pointer}
.bar .col{width:100%;border-radius:6px 6px 3px 3px;background:var(--line);min-height:6px;transition:height .35s ease}
.bar .lbl{font-size:11px;color:var(--muted);font-weight:600}
.bar.today .lbl{color:var(--estudo)}
.stats{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center}
.stat b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--navy);line-height:1.1}
.stat span{font-size:11.5px;color:var(--muted)}

/* ---------- day card ---------- */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);padding:18px;margin-bottom:14px}
.dayhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.dayhead h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy)}
.dayhead input[type=date]{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg)}
.daytype{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 10px;border-radius:10px;margin-bottom:6px;background:var(--bg);border-left:4px solid var(--line);cursor:pointer;user-select:none}
.item input{margin-top:3px;width:19px;height:19px;accent-color:var(--estudo);flex-shrink:0}
.item.done{background:#F0F6F1}
.item .tx b{display:block;font-weight:600;font-size:14.5px}
.item .tx span{font-size:12px;color:var(--muted)}
.item.c-estudo{border-left-color:var(--estudo)}
.item.c-familia{border-left-color:var(--familia)}
.item.c-fisico{border-left-color:var(--fisico)}
.item.c-sono{border-left-color:var(--sono)}
.item.ro{cursor:default;opacity:.92}
textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;resize:vertical;min-height:64px;margin-top:6px;background:#fff}
label.small{font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-top:14px}
.mentorbox{border-left:4px solid var(--fisico);background:#FBF4EC;border-radius:10px;padding:10px 12px;margin-top:8px;font-size:14px}
.mentorbox b{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--fisico);display:block;margin-bottom:3px}
.savebar{display:flex;align-items:center;gap:12px;margin-top:16px}
.btn{background:var(--estudo);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.55;cursor:wait}
.savemsg{font-size:13px;color:var(--ok);font-weight:600;opacity:0;transition:opacity .3s}
.savemsg.show{opacity:1}

/* ---------- history grid ---------- */
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.cell{aspect-ratio:1;border-radius:7px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#fff;font-weight:600;cursor:pointer;position:relative}
.cell.empty{background:#E6EAF0;color:#AEB6C2}
.legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.legend div{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.dot{width:13px;height:13px;border-radius:4px}

.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--estudo);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.note-share{font-size:12px;color:var(--muted);text-align:center;margin-top:20px}
@media (prefers-reduced-motion: reduce){.spin{animation:none}.bar .col{transition:none}}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <h1>Cadência de Estudos</h1>
    <div class="hsub">Plano de 4 anos · acompanhamento diário Cesar + mentor</div>
    <div class="role">
      <button id="roleCesar" class="on">Sou o Cesar</button>
      <button id="roleMentor">Sou o mentor</button>
    </div>
  </div>
</header>

<div class="wrap" id="app">
  <div class="loading"><div class="spin"></div>Carregando registros...</div>
</div>

<script>
/* ================= dados ================= */
const PLAN = {
  weekday: [ /* seg a qui */
    {id:'fisica', t:'Atividade física ou sono extra', s:'05h-06h · treino seg/qua, sono extra ter/qui', c:'fisico'},
    {id:'audio1', t:'Áudio no deslocamento', s:'Ida e volta · lei seca, aulas gravadas', c:'estudo'},
    {id:'flash',  t:'Flashcards no almoço', s:'20 min · revisão espaçada', c:'estudo'},
    {id:'quest',  t:'Bateria de questões', s:'17h-18h · cronometrada', c:'estudo'},
    {id:'teoria', t:'Teoria nova', s:'21h-22:30 · conteúdo do ciclo', c:'estudo'},
    {id:'rev',    t:'Revisão do dia', s:'22:30-23h · flashcards e erros', c:'estudo'},
    {id:'sono',   t:'Dormir às 23h', s:'Proteção do sono', c:'sono'},
  ],
  sexta: [
    {id:'fisica', t:'Atividade física', s:'05h-06h', c:'fisico'},
    {id:'audio1', t:'Áudio no deslocamento', s:'Ida e volta', c:'estudo'},
    {id:'familia',t:'Dia da Família cumprido', s:'A partir das 17h · sem estudo à noite', c:'familia'},
  ],
  sabado: [
    {id:'treino', t:'Treino longo', s:'05h-07h', c:'fisico'},
    {id:'famM',   t:'Manhã com a família', s:'07h-12h', c:'familia'},
    {id:'estudo', t:'Bloco de estudo', s:'14h-17h · 1 sábado/mês: simulado completo', c:'estudo'},
    {id:'famT',   t:'Tarde e noite com a família', s:'17h-20:30', c:'familia'},
  ],
  domingo: [
    {id:'treino', t:'Treino longo', s:'05h-07h', c:'fisico'},
    {id:'famM',   t:'Manhã com a família', s:'07h-12h', c:'familia'},
    {id:'estudo', t:'Bloco de estudo', s:'14h-17h', c:'estudo'},
    {id:'plan',   t:'Planejamento da semana', s:'21h-22h · ciclo de estudos e metas', c:'estudo'},
  ]
};
const HOURS = {audio1:1, flash:0.33, quest:1, teoria:1.5, rev:0.5, estudo:3, plan:1};
const DAYNAMES = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const KEY = 'cadencia-estudos-cesar';

let DB = {days:{}};
let role = 'cesar';
let selDate = todayISO();

function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dateFromISO(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function dayType(iso){ const g=dateFromISO(iso).getDay(); if(g===0)return'domingo'; if(g===6)return'sabado'; if(g===5)return'sexta'; return'weekday'; }
function typeLabel(t){ return t==='weekday'?'Rotina de segunda a quinta':t==='sexta'?'Sexta · Dia da Família':t==='sabado'?'Sábado':'Domingo'; }
function pct(iso){
  const items = PLAN[dayType(iso)]; const rec = DB.days[iso];
  if(!rec || !rec.items) return null;
  const done = items.filter(i=>rec.items[i.id]).length;
  return Math.round(100*done/items.length);
}
function studyHours(iso){
  const rec = DB.days[iso]; if(!rec||!rec.items) return 0;
  return PLAN[dayType(iso)].reduce((s,i)=> s + (rec.items[i.id] ? (HOURS[i.id]||0) : 0), 0);
}
function colorFor(p){ if(p===null)return null; if(p>=80)return'var(--ok)'; if(p>=50)return'var(--warn)'; return'var(--bad)'; }

/* ================= sincronização (Supabase) ================= */
const CFG_KEY = 'cadencia-cfg';
let CFG = null;
let syncState = 'off'; // off | ok | erro

function loadCfg(){
  if(location.hash.startsWith('#cfg=')){
    try{
      CFG = JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(5)))));
      localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
      history.replaceState(null,'',location.pathname);
    }catch(e){}
  }
  if(!CFG){ try{ CFG = JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){} }
}
function sbHeaders(){ return {apikey:CFG.key, Authorization:'Bearer '+CFG.key, 'Content-Type':'application/json'}; }
async function remoteGet(){
  const r = await fetch(CFG.url.replace(/\/$/,'')+'/rest/v1/cadencia?select=value&key=eq.main',{headers:sbHeaders()});
  if(!r.ok) throw new Error('http '+r.status);
  const j = await r.json();
  return j.length ? j[0].value : null;
}
async function remoteSet(val){
  const r = await fetch(CFG.url.replace(/\/$/,'')+'/rest/v1/cadencia',{
    method:'POST',
    headers:Object.assign(sbHeaders(),{Prefer:'resolution=merge-duplicates'}),
    body:JSON.stringify({key:'main', value:val, updated_at:new Date().toISOString()})
  });
  if(!r.ok) throw new Error('http '+r.status);
}
/* mescla o remoto no DB local; em conflito de campo, o local (quem está editando) vence */
function mergeRemote(remote){
  if(!remote || !remote.days) return;
  for(const [iso, rday] of Object.entries(remote.days)){
    if(!DB.days[iso]){ DB.days[iso] = rday; continue; }
    const l = DB.days[iso];
    l.items = Object.assign({}, rday.items||{}, l.items||{});
    ['studied','reason','note','mentorNote'].forEach(f=>{ if(!l[f] && rday[f]) l[f]=rday[f]; });
  }
}
function cacheLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }

async function load(){
  loadCfg();
  try{ const v = localStorage.getItem(KEY); if(v) DB = JSON.parse(v); }catch(e){}
  if(CFG){
    try{
      const remote = await remoteGet();
      if(remote){ const local = DB; DB = remote; mergeRemoteFromLocal(local); }
      syncState='ok';
    }catch(e){ syncState='erro'; }
  }
  cacheLocal();
  render();
}
/* na carga, o remoto é a base e os dias que só existem localmente são preservados */
function mergeRemoteFromLocal(local){
  if(!local || !local.days) return;
  for(const [iso, lday] of Object.entries(local.days)){
    if(!DB.days[iso]){ DB.days[iso]=lday; }
  }
}
async function save(btn, msg){
  if(btn){btn.disabled=true;}
  cacheLocal();
  if(CFG){
    try{
      const remote = await remoteGet();
      mergeRemote(remote);           // traz o que o outro lado registrou
      await remoteSet(DB);           // publica a versão mesclada
      syncState='ok';
      if(msg){msg.classList.add('show'); setTimeout(()=>msg.classList.remove('show'),1800);}
    }catch(e){
      syncState='erro';
      alert('Salvo neste aparelho, mas a sincronização falhou. Verifique a internet e toque em Salvar novamente.');
    }
    cacheLocal();
  } else {
    if(msg){msg.classList.add('show'); setTimeout(()=>msg.classList.remove('show'),1800);}
  }
  if(btn){btn.disabled=false;}
}
/* atualiza ao voltar para o app */
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && CFG){ load(); } });
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

/* ================= render ================= */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(!CFG){ app.appendChild(setupCard()); return; }
  app.appendChild(syncBadge());
  app.appendChild(cadenceCard());
  app.appendChild(dayCard());
  app.appendChild(historyCard());
  const shareCard = document.createElement('div'); shareCard.className='card';
  shareCard.innerHTML = `<div class="cad-title"><h2 style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)">Enviar ao mentor</h2></div>
  <p style="font-size:13.5px;color:var(--muted);margin-bottom:12px">Gera um resumo dos últimos 7 dias (cumprimento, horas, conteúdo estudado e justificativas) pronto para enviar no WhatsApp.</p>`;
  const shareBtn = document.createElement('button'); shareBtn.className='btn';
  shareBtn.style.background='var(--familia)';
  shareBtn.textContent='Gerar resumo para WhatsApp';
  shareBtn.onclick = shareWeek;
  shareCard.appendChild(shareBtn);
  const invBtn = document.createElement('button'); invBtn.className='btn';
  invBtn.style.cssText='background:var(--navy-2);margin-left:10px';
  invBtn.textContent='Convidar mentor (link do app)';
  invBtn.onclick = inviteMentor;
  shareCard.appendChild(invBtn);
  app.appendChild(shareCard);
  const n = document.createElement('div');
  n.className='note-share';
  n.textContent = 'Os registros são sincronizados entre os aparelhos conectados. Mantenha o link de convite restrito a você e ao mentor.';
  app.appendChild(n);
}

function syncBadge(){
  const b = document.createElement('div');
  const map = {ok:['#F0F6F1','var(--ok)','Sincronizado na nuvem'], erro:['#FBEeeC','var(--bad)','Sem conexão: salvando só neste aparelho'], off:['#EEF1F5','var(--muted)','Sincronização não configurada']};
  const [bg,c,t] = map[syncState]||map.off;
  b.style.cssText = 'background:'+bg+';color:'+c+';border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:600;margin-bottom:12px;text-align:center';
  b.textContent = t;
  return b;
}

function inviteMentor(){
  const cfg64 = btoa(unescape(encodeURIComponent(JSON.stringify(CFG))));
  const link = location.origin + location.pathname + '#cfg=' + cfg64;
  const txt = 'Convite: acompanhamento do meu plano de estudos para concurso.\n\n1. Abra este link no celular:\n'+link+'\n\n2. No navegador, use "Adicionar à tela inicial" para instalar como app.\n3. Dentro do app, selecione "Sou o mentor".';
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function setupCard(){
  const el = document.createElement('div'); el.className='card';
  el.innerHTML = `<div class="cad-title"><h2 style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)">Configurar sincronização</h2></div>
  <p style="font-size:14px;color:var(--muted);margin-bottom:6px">Passo único, feito só por você (o mentor entra depois pelo link de convite):</p>
  <ol style="font-size:13.5px;color:var(--ink);margin:0 0 14px 18px;line-height:1.7">
    <li>Crie um projeto gratuito em <b>supabase.com</b></li>
    <li>No <b>SQL Editor</b>, cole e execute o script que veio junto com o app (arquivo <b>setup-supabase.sql</b>)</li>
    <li>Em <b>Settings → API</b>, copie a <b>Project URL</b> e a chave <b>anon public</b> e cole abaixo</li>
  </ol>
  <label class="small">Project URL</label>`;
  const inUrl = document.createElement('input');
  inUrl.placeholder='https://xxxx.supabase.co';
  inUrl.style.cssText='width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;margin-top:6px';
  el.appendChild(inUrl);
  const l2 = document.createElement('label'); l2.className='small'; l2.textContent='Chave anon public';
  el.appendChild(l2);
  const inKey = document.createElement('input');
  inKey.placeholder='eyJhbGciOi...';
  inKey.style.cssText=inUrl.style.cssText;
  el.appendChild(inKey);
  const bar = document.createElement('div'); bar.className='savebar';
  const btn = document.createElement('button'); btn.className='btn'; btn.textContent='Conectar';
  const msg = document.createElement('span'); msg.style.cssText='font-size:13px;color:var(--bad);font-weight:600';
  btn.onclick = async ()=>{
    btn.disabled=true; msg.textContent='';
    CFG = {url:inUrl.value.trim(), key:inKey.value.trim()};
    try{
      await remoteGet();
      localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
      await load();
    }catch(e){
      CFG=null; msg.textContent='Não conectou. Confira a URL, a chave e se o script SQL foi executado.';
    }
    btn.disabled=false;
  };
  bar.appendChild(btn); bar.appendChild(msg);
  el.appendChild(bar);
  const skip = document.createElement('p');
  skip.style.cssText='font-size:12.5px;color:var(--muted);margin-top:14px';
  skip.innerHTML='Prefere usar sem sincronização por enquanto? <a href="#" id="skipSync" style="color:var(--estudo)">Continuar só neste aparelho</a>';
  el.appendChild(skip);
  setTimeout(()=>{ const a=document.getElementById('skipSync'); if(a) a.onclick=(e)=>{e.preventDefault(); CFG={skip:true}; renderLocalOnly();}; },0);
  return el;
}
function renderLocalOnly(){ CFG=null; syncState='off';
  const app=document.getElementById('app'); app.innerHTML='';
  app.appendChild(syncBadge()); app.appendChild(cadenceCard()); app.appendChild(dayCard()); app.appendChild(historyCard());
  const n=document.createElement('div'); n.className='note-share';
  n.textContent='Registros salvos apenas neste aparelho. Configure a sincronização depois recarregando a página.';
  app.appendChild(n);
}

function shareWeek(){
  const t = dateFromISO(todayISO());
  let lines = ['*Cadência de Estudos - resumo dos últimos 7 dias*',''];
  let totalH = 0;
  for(let i=6;i>=0;i--){
    const d=new Date(t); d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const p=pct(iso); const h=studyHours(iso); totalH+=h;
    const rec=DB.days[iso]||{};
    const name=DAYNAMES[d.getDay()].slice(0,3)+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    lines.push('*'+name+'*: '+(p===null?'sem registro':p+'% cumprido, '+h.toFixed(1).replace('.',',')+'h de estudo'));
    if(rec.studied) lines.push('  Estudei: '+rec.studied);
    const jr = rec.reason||rec.note;
    if(jr) lines.push('  Justificativa: '+jr);
  }
  lines.push('');
  lines.push('*Total de estudo na janela: '+totalH.toFixed(1).replace('.',',')+'h* (meta semanal: 19h)');
  const url='https://wa.me/?text='+encodeURIComponent(lines.join('\n'));
  window.open(url,'_blank');
}

function cadenceCard(){
  const el = document.createElement('div'); el.className='cadence';
  // últimos 7 dias terminando hoje
  const days=[]; const t=dateFromISO(todayISO());
  for(let i=6;i>=0;i--){ const d=new Date(t); d.setDate(d.getDate()-i);
    days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  // horas de estudo na semana corrente (a partir de segunda)
  const dow=(t.getDay()+6)%7; let wk=0;
  for(let i=0;i<=dow;i++){ const d=new Date(t); d.setDate(d.getDate()-(dow-i));
    wk += studyHours(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); }
  // sequência de dias com >=80%
  let streak=0;
  for(let i=0;;i++){ const d=new Date(t); d.setDate(d.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const p=pct(iso);
    if(p!==null && p>=80){streak++;} else if(i===0 && p===null){continue;} else break;
    if(i>365)break; }
  // média 7 dias
  const vals = days.map(pct).filter(p=>p!==null);
  const avg = vals.length? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;

  el.innerHTML = `<div class="cad-title"><h2>Cadência dos últimos 7 dias</h2><span>toque numa barra para abrir o dia</span></div>`;
  const bars = document.createElement('div'); bars.className='bars';
  days.forEach(iso=>{
    const p = pct(iso);
    const b = document.createElement('div'); b.className='bar'+(iso===todayISO()?' today':'');
    const col = document.createElement('div'); col.className='col';
    col.style.height = (p===null?6:Math.max(8,p*0.8))+'px';
    if(p!==null) col.style.background = colorFor(p);
    const lbl = document.createElement('div'); lbl.className='lbl';
    lbl.textContent = DAYNAMES[dateFromISO(iso).getDay()].slice(0,3);
    b.appendChild(col); b.appendChild(lbl);
    b.onclick = ()=>{ selDate = iso; render(); window.scrollTo({top:0}); };
    bars.appendChild(b);
  });
  el.appendChild(bars);
  const st = document.createElement('div'); st.className='stats';
  st.innerHTML = `
    <div class="stat"><b>${wk.toFixed(1).replace('.',',')}h</b><span>estudo esta semana<br>(meta 19h)</span></div>
    <div class="stat"><b>${avg}%</b><span>cumprimento<br>média 7 dias</span></div>
    <div class="stat"><b>${streak}</b><span>dias seguidos<br>com 80% ou mais</span></div>`;
  el.appendChild(st);
  return el;
}

function dayCard(){
  const el = document.createElement('div'); el.className='card';
  const type = dayType(selDate);
  const rec = DB.days[selDate] || {items:{}, note:'', mentorNote:''};
  const d = dateFromISO(selDate);

  const head = document.createElement('div'); head.className='dayhead';
  head.innerHTML = `<h2>${DAYNAMES[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</h2>`;
  const inp = document.createElement('input'); inp.type='date'; inp.value=selDate;
  inp.onchange = ()=>{ if(inp.value){selDate=inp.value; render();} };
  head.appendChild(inp);
  el.appendChild(head);

  const sub = document.createElement('div'); sub.className='daytype';
  sub.textContent = typeLabel(type) + (role==='mentor' ? ' · modo mentor (leitura + comentário)' : '');
  el.appendChild(sub);

  PLAN[type].forEach(it=>{
    const row = document.createElement('div');
    row.className = 'item c-'+it.c + (rec.items[it.id]?' done':'') + (role==='mentor'?' ro':'');
    const cb = document.createElement('input'); cb.type='checkbox';
    cb.checked = !!rec.items[it.id];
    cb.disabled = (role==='mentor');
    const tx = document.createElement('div'); tx.className='tx';
    tx.innerHTML = `<b>${it.t}</b><span>${it.s}</span>`;
    row.appendChild(cb); row.appendChild(tx);
    if(role!=='mentor'){
      row.onclick = (e)=>{ if(e.target!==cb) cb.checked=!cb.checked;
        rec.items[it.id]=cb.checked; DB.days[selDate]=rec;
        row.classList.toggle('done', cb.checked); };
    }
    el.appendChild(row);
  });

  // registro de estudo do Cesar
  const l1 = document.createElement('label'); l1.className='small'; l1.textContent='O que foi estudado hoje';
  el.appendChild(l1);
  if(role==='cesar'){
    const ta = document.createElement('textarea'); ta.value = rec.studied||'';
    ta.placeholder='Matérias, tópicos e quantidade de questões. Ex.: Dir. Administrativo (licitações) + 40 questões AFO...';
    ta.oninput = ()=>{ rec.studied=ta.value; DB.days[selDate]=rec; };
    el.appendChild(ta);
  } else {
    const box = document.createElement('div'); box.className='mentorbox';
    box.innerHTML = `<b>Conteúdo estudado</b>${rec.studied ? rec.studied.replace(/</g,'&lt;') : '<i>Sem registro de conteúdo neste dia.</i>'}`;
    el.appendChild(box);
  }

  // justificativa
  const lj = document.createElement('label'); lj.className='small'; lj.textContent='Justificativa (se algo não foi cumprido)';
  el.appendChild(lj);
  const legacyReason = rec.reason || rec.note || '';
  if(role==='cesar'){
    const ta = document.createElement('textarea'); ta.value = legacyReason;
    ta.placeholder='Por que algum bloco não aconteceu: imprevisto no trabalho, filho doente, cansaço... Honestidade aqui é o que permite ajustar o plano.';
    ta.oninput = ()=>{ rec.reason=ta.value; DB.days[selDate]=rec; };
    el.appendChild(ta);
  } else {
    const box = document.createElement('div'); box.className='mentorbox';
    box.innerHTML = `<b>Justificativa do Cesar</b>${legacyReason ? legacyReason.replace(/</g,'&lt;') : '<i>Sem justificativas neste dia.</i>'}`;
    el.appendChild(box);
  }

  // comentário do mentor
  const l2 = document.createElement('label'); l2.className='small'; l2.textContent='Comentário do mentor';
  el.appendChild(l2);
  if(role==='mentor'){
    const ta = document.createElement('textarea'); ta.value = rec.mentorNote||'';
    ta.placeholder='Feedback, cobrança, ajuste de rota...';
    ta.oninput = ()=>{ rec.mentorNote=ta.value; DB.days[selDate]=rec; };
    el.appendChild(ta);
  } else {
    const box = document.createElement('div'); box.className='mentorbox';
    box.innerHTML = `<b>Mentor</b>${rec.mentorNote ? rec.mentorNote.replace(/</g,'&lt;') : '<i>Ainda sem comentário do mentor neste dia.</i>'}`;
    el.appendChild(box);
  }

  const bar = document.createElement('div'); bar.className='savebar';
  const btn = document.createElement('button'); btn.className='btn';
  btn.textContent = role==='mentor' ? 'Salvar comentário' : 'Salvar dia';
  const msg = document.createElement('span'); msg.className='savemsg'; msg.textContent='Salvo ✓';
  btn.onclick = ()=>{ DB.days[selDate]=rec; save(btn,msg).then(render); };
  bar.appendChild(btn); bar.appendChild(msg);
  el.appendChild(bar);
  return el;
}

function historyCard(){
  const el = document.createElement('div'); el.className='card';
  el.innerHTML = `<div class="cad-title"><h2 style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)">Últimas 4 semanas</h2></div>`;
  const grid = document.createElement('div'); grid.className='grid';
  const t = dateFromISO(todayISO());
  const dow=(t.getDay()+6)%7; // seg=0
  const start = new Date(t); start.setDate(start.getDate()-dow-21);
  for(let i=0;i<28;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const p=pct(iso);
    const c=document.createElement('div'); c.className='cell'+(p===null?' empty':'');
    c.textContent=d.getDate();
    if(p!==null) c.style.background=colorFor(p);
    if(d>t){ c.style.visibility='hidden'; }
    c.title = iso + (p===null?'':' · '+p+'%');
    c.onclick=()=>{ selDate=iso; render(); window.scrollTo({top:0}); };
    grid.appendChild(c);
  }
  el.appendChild(grid);
  const lg=document.createElement('div'); lg.className='legend';
  lg.innerHTML=`<div><span class="dot" style="background:var(--ok)"></span>80% ou mais</div>
  <div><span class="dot" style="background:var(--warn)"></span>50 a 79%</div>
  <div><span class="dot" style="background:var(--bad)"></span>abaixo de 50%</div>
  <div><span class="dot" style="background:#E6EAF0"></span>sem registro</div>`;
  el.appendChild(lg);
  return el;
}

/* ================= role toggle ================= */
document.getElementById('roleCesar').onclick=()=>{role='cesar';
  document.getElementById('roleCesar').classList.add('on');
  document.getElementById('roleMentor').classList.remove('on'); render();};
document.getElementById('roleMentor').onclick=()=>{role='mentor';
  document.getElementById('roleMentor').classList.add('on');
  document.getElementById('roleCesar').classList.remove('on'); render();};

load();
</script>
